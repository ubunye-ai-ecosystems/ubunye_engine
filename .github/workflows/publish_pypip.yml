name: Publish to PyPI

on:
  push:
    tags:
      - 'v*' # Trigger only on version tags like v0.1.0

jobs:
  build-n-publish:
    runs-on: ubuntu-latest
    environment: pypip         # protects releases with an approval gate
                               # (must match the env name on the PyPI Trusted
                               # Publisher entry exactly - case-sensitive)
    permissions:
      contents: read
      id-token: write          # required for OIDC Trusted Publishers
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build tools
        run: pip install build
      - name: Build binary wheel and source tarball
        run: python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true