MODEL: "etl"
VERSION: "1.0.0"

ENGINE:
  spark_conf:
    spark.sql.shuffle.partitions: "4"

CONFIG:
  inputs:
    clean_events:
      format: s3
      path: "/tmp/ubunye_demo/clean_events"
  transform:
    type: noop
  outputs:
    summary:
      format: s3
      path: "/tmp/ubunye_demo/summary"
      mode: overwrite
