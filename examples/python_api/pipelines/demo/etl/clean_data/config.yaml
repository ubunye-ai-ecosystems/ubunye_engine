MODEL: "etl"
VERSION: "1.0.0"

ENGINE:
  catalog: "{{ env.UNITY_CATALOG | default('') }}"
  schema_name: "{{ env.UNITY_SCHEMA | default('default') }}"
  spark_conf:
    spark.sql.shuffle.partitions: "4"
  profiles:
    prod:
      spark_conf:
        spark.sql.shuffle.partitions: "200"
      catalog: "aws-db-prod-aic-catalog"

CONFIG:
  inputs:
    raw_events:
      format: s3
      path: "{{ dt | default('data/raw_events.parquet') }}"
  transform:
    type: noop
  outputs:
    clean_events:
      format: s3
      path: "/tmp/ubunye_demo/clean_events"
      mode: overwrite
