MODEL: "etl"
VERSION: "1.0.0"

# Task 2 of the ABSA flood-risk pipeline: read the geocoded addresses
# produced by Task 1 (``address_geocoded``), call the JBA floodscores and
# flooddepths endpoints for each point, merge the two response sets on
# ``id``, snake-case the 60+ column names, and write one Unity Catalog
# Delta table per address keyed by ``id``.
#
# Running this task in isolation (``ubunye run -t flood_risk``) re-uses
# whatever the previous geocoding run wrote; there is no re-geocoding
# cost when JBA data refreshes on its own cadence.
ENGINE:
  spark_conf:
    spark.sql.shuffle.partitions: "8"
  profiles:
    DEV:
      spark_conf:
        spark.sql.shuffle.partitions: "2"
    PROD:
      spark_conf:
        spark.sql.shuffle.partitions: "16"

CONFIG:
  inputs:
    address_geocoded:
      format: unity
      table: "{{ env.TELM_CATALOG }}.{{ env.TELM_SCHEMA }}.address_geocoded"

  transform:
    type: noop

  outputs:
    address_flood_risk:
      format: unity
      table: "{{ env.TELM_CATALOG }}.{{ env.TELM_SCHEMA }}.address_flood_risk"
      mode: overwrite
      options:
        overwriteSchema: "true"
        comment: "JBA floodscores + flooddepths merged per geocoded address, one row per id."
