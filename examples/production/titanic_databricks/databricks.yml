# Databricks Asset Bundle — Titanic Survival pipeline.
#
# Uses serverless compute and writes the result as a Unity Catalog managed
# Delta table. Runs on Databricks Free Edition (which disallows classic-
# cluster creation) and on standard paid workspaces alike. The notebook
# downloads the Titanic CSV to /tmp at runtime and installs ubunye-engine
# via %pip - so no DBFS bootstrap and no manual workspace setup required.

bundle:
  name: titanic-survival

include:
  - pipelines/**/*.yaml

variables:
  titanic_catalog:
    description: |
      Unity Catalog catalog for the output table. Defaults to ``workspace``
      because that is the catalog Free Edition provisions automatically.
      Override to ``main`` (or your standard catalog) on paid workspaces.
    default: "workspace"
  titanic_schema:
    description: Unity Catalog schema for the output table.
    default: "titanic"
  data_timestamp:
    description: Data timestamp injected into the config as ``{{ dt }}``.
    default: "2026-04-15"

sync:
  include:
    - pipelines/**
    - notebooks/**

resources:
  jobs:
    titanic_survival:
      name: titanic_survival_by_class
      max_concurrent_runs: 1
      tasks:
        - task_key: run_pipeline
          notebook_task:
            notebook_path: ./notebooks/run_titanic.py
            base_parameters:
              task_dir: ${workspace.file_path}/pipelines/titanic/analytics/survival_by_class
              dt: ${var.data_timestamp}
              mode: "PROD"
              titanic_catalog: ${var.titanic_catalog}
              titanic_schema: ${var.titanic_schema}
          # Serverless compute: no new_cluster / existing_cluster_id block.
          # Notebook tasks with no cluster spec route to serverless.

targets:
  nonprod:
    mode: development
    default: true
    # No workspace.host: DABs read it from $DATABRICKS_HOST. Self-referencing
    # ${workspace.host} is rejected by the CLI ("Variable interpolation is
    # not supported for fields that configure authentication").
    # mode: development prefixes deployments with the current user so two
    # developers sharing a workspace don't clobber each other's jobs.
