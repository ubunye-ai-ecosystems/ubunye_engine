MODEL: "etl"
VERSION: "1.0.0"

ENGINE:
  spark_conf:
    spark.sql.shuffle.partitions: "4"
  profiles:
    DEV:
      spark_conf:
        spark.sql.shuffle.partitions: "2"
    PROD:
      spark_conf:
        spark.sql.shuffle.partitions: "50"

CONFIG:
  inputs:
    cleaned:
      format: s3
      path: "{{ env.TITANIC_CLEAN_PATH }}/dt={{ dt | default('latest') }}"
      file_format: parquet
  transform:
    type: noop
  outputs:
    survival_summary:
      format: s3
      path: "{{ env.TITANIC_SUMMARY_PATH }}/dt={{ dt | default('latest') }}"
      file_format: parquet
      mode: overwrite
