MODEL: "etl"
VERSION: "1.0.0"

ENGINE:
  spark_conf:
    spark.sql.shuffle.partitions: "4"
    spark.sql.sources.partitionOverwriteMode: "dynamic"
  profiles:
    DEV:
      spark_conf:
        spark.sql.shuffle.partitions: "2"
    PROD:
      spark_conf:
        spark.sql.shuffle.partitions: "8"

CONFIG:
  inputs:
    titanic:
      format: s3
      path: "{{ env.TITANIC_INPUT_PATH }}"
      file_format: csv
      options:
        header: "true"
        inferSchema: "true"
        mode: "FAILFAST"
  transform:
    type: noop
  outputs:
    cleaned:
      format: unity
      table: "{{ env.TITANIC_CATALOG | default('workspace') }}.{{ env.TITANIC_SCHEMA | default('titanic') }}.titanic_cleaned"
      mode: overwrite
      options:
        overwriteSchema: "true"
