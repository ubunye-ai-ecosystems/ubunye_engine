MODEL: "ml"
VERSION: "1.0.0"

# Batch-scoring task for the Titanic classifier.
#
# Loads the current production (or staging, if PRODUCTION is empty) version
# from the Ubunye Model Registry, scores the raw Titanic DataFrame, and
# writes predictions to a Unity Catalog managed Delta table.

ENGINE:
  spark_conf:
    spark.sql.shuffle.partitions: "4"
  profiles:
    DEV:
      spark_conf:
        spark.sql.shuffle.partitions: "2"
    PROD:
      spark_conf:
        spark.sql.shuffle.partitions: "4"

CONFIG:
  inputs:
    titanic:
      format: s3
      path: "{{ env.TITANIC_INPUT_PATH }}"
      file_format: csv
      options:
        header: "true"
        inferSchema: "true"
        mode: "FAILFAST"
  transform:
    type: noop
  outputs:
    predictions:
      format: unity
      table: "{{ env.TITANIC_CATALOG | default('workspace') }}.{{ env.TITANIC_SCHEMA | default('titanic_ml') }}.predictions"
      mode: overwrite
      file_format: delta
      options:
        overwriteSchema: "true"
        comment: "Titanic per-passenger survival predictions from the current model."
