# Databricks Asset Bundle - JHB hourly forecast pipeline.
#
# Deploys the ``jhb_weather_forecast`` job that calls the Open-Meteo REST API
# once a day, explodes the hourly arrays into a tidy DataFrame, and writes the
# result to a Unity Catalog Delta table.
#
# Uses serverless compute so it runs on Databricks Free Edition (where
# classic-cluster creation is disallowed) and standard workspaces alike.
# The notebook installs ``ubunye-engine`` at runtime via ``%pip``.

bundle:
  name: jhb-weather-ingest

include:
  - pipelines/**/*.yaml

variables:
  weather_catalog:
    description: |
      Unity Catalog catalog name for the output table. Defaults to
      ``workspace`` because that is the catalog Free Edition provisions
      automatically. Override to ``main`` (or your standard catalog) on
      paid workspaces.
    default: "workspace"
  weather_schema:
    description: Unity Catalog schema name for the output table.
    default: "weather"
  data_timestamp:
    description: Data timestamp injected into the config as ``{{ dt }}``.
    default: "2026-04-15"

sync:
  include:
    - pipelines/**
    - notebooks/**

resources:
  jobs:
    jhb_weather_forecast:
      name: jhb_weather_hourly_forecast
      max_concurrent_runs: 1
      schedule:
        quartz_cron_expression: "0 0 6 * * ?"
        timezone_id: "Africa/Johannesburg"
        pause_status: UNPAUSED
      tasks:
        - task_key: ingest_forecast
          notebook_task:
            notebook_path: ./notebooks/run_jhb_weather.py
            base_parameters:
              task_dir: ${workspace.file_path}/pipelines/jhb_weather/ingestion/hourly_forecast
              dt: ${var.data_timestamp}
              mode: "PROD"
              weather_catalog: ${var.weather_catalog}
              weather_schema: ${var.weather_schema}
          # Serverless compute: no new_cluster / existing_cluster_id block.
          # Databricks routes notebook_task to serverless when no cluster
          # spec is supplied. The notebook installs ubunye-engine via %pip.

targets:
  nonprod:
    mode: development
    default: true
    workspace:
      host: ${workspace.host}
  prod:
    mode: production
    workspace:
      host: ${workspace.host}
    variables:
      weather_schema: weather_prod
