MODEL: "etl"
VERSION: "0.1.0"
ENGINE:
  spark_conf:
    spark.sql.shuffle.partitions: "1"
CONFIG:
  inputs:
    source:
      format: hive
      db_name: raw_db
      tbl_name: claims
  transform:
    type: noop
  outputs:
    sink:
      format: s3
      path: "s3a://bucket/fraud/out/"
      mode: overwrite
